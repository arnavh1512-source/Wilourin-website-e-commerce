<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wilourin — Worn slowly.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prata&family=Playfair+Display:wght@300;400&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f4f1ec; color: #15140f; overflow-x: hidden; }
    body { font-family: 'Raleway', sans-serif; font-weight: 400; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    ::selection { background: #1f4a30; color: #f4f1ec; }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    section { animation: revealUp 0.9s ease-out both; }
    input::placeholder { color: rgba(232,228,216,0.4); font-style: italic; }
    a { color: inherit; }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .nav-inner { padding: 14px 18px !important; }
      .products-section { padding: 60px 18px 80px !important; }
      .products-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
      .philosophy-section { padding: 64px 22px !important; }
      .footer-section { padding: 60px 22px 32px !important; }
      .footer-grid { grid-template-columns: 1fr !important; gap: 36px !important; padding-bottom: 40px !important; }
      .footer-bottom { flex-direction: column !important; align-items: flex-start !important; gap: 24px !important; }
      .footer-wordmark { height: 40px !important; }
      aside { width: 100vw !important; max-width: 100vw !important; }
    }
    @media (max-width: 480px) {
      .nav-logo { height: 32px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + Babel standalone -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/* ── Palette ── */
const C = {
  marbleBase: "#f4f1ec",
  marbleInk: "#15140f",
  marbleInkSoft: "rgba(21,20,15,0.78)",
  marbleInkFaint: "rgba(21,20,15,0.58)",
  marbleLine: "rgba(21,20,15,0.22)",
  forestDark: "#0d2818",
  forestMid: "#1a3d2a",
  forestEmerald: "#1f4a30",
  cream: "#e8e4d8",
  creamFaint: "rgba(232,228,216,0.55)",
};

/* ── Icons ── */
const IconSearch = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
  </svg>
);
const IconUser = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="8.5" r="4"/><path d="M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6"/>
  </svg>
);
const IconBag = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <path d="M5 8h14l-1.2 11.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8z"/>
    <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
  </svg>
);
const IconHeart = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 20.5s-7.5-4.5-9.4-9.2C1.2 7.6 4 4 7.5 4c2 0 3.5 1.2 4.5 2.8C13 5.2 14.5 4 16.5 4 20 4 22.8 7.6 21.4 11.3 19.5 16 12 20.5 12 20.5z"/>
  </svg>
);
const IconInstagram = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
  </svg>
);
const IconWhatsApp = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </svg>
);

const navBtn = {
  background: "transparent", border: "none", cursor: "pointer",
  padding: 6, display: "inline-flex", alignItems: "center",
  justifyContent: "center", color: "inherit", position: "relative",
};

/* ── Nav ── */
function Nav({ onCart, cartCount }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const s = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", s);
    return () => window.removeEventListener("scroll", s);
  }, []);

  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: scrolled ? "rgba(244,241,236,0.92)" : "rgba(244,241,236,0.7)",
      backdropFilter: "blur(18px)", WebkitBackdropFilter: "blur(18px)",
      borderBottom: `1px solid ${C.marbleLine}`,
      transition: "background 0.3s",
    }}>
      <div className="nav-inner" style={{
        display: "grid", gridTemplateColumns: "1fr auto 1fr",
        alignItems: "center", padding: "16px 32px",
      }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button style={{ ...navBtn, color: "#115511" }}><IconSearch /></button>
          <button style={{ ...navBtn, color: "#115511" }}><IconUser /></button>
        </div>

        <img
          src="assets/wilourin-logo.png"
          alt="WILOURIN"
          className="nav-logo"
          style={{ height: 50, objectFit: "contain" }}
        />

        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", alignItems: "center" }}>
          <button style={{ ...navBtn, color: "#115511" }}><IconHeart /></button>
          <button onClick={onCart} style={{ ...navBtn, color: "#115511" }}>
            <IconBag />
            {cartCount > 0 && (
              <span style={{
                position: "absolute", top: 0, right: -2,
                background: C.forestEmerald, color: C.cream,
                padding: "1px 5px", fontSize: 8, borderRadius: 999,
                fontWeight: 700, fontFamily: "'Raleway',sans-serif",
                lineHeight: "14px", minWidth: 14, textAlign: "center",
              }}>{cartCount}</span>
            )}
          </button>
        </div>
      </div>
    </nav>
  );
}

/* ── Corner accent ── */
function Corner({ pos }) {
  const positions = { tl: { top: 12, left: 12 }, tr: { top: 12, right: 12 }, bl: { bottom: 12, left: 12 }, br: { bottom: 12, right: 12 } };
  const rotate = { tl: 0, tr: 90, br: 180, bl: 270 };
  return (
    <div style={{
      position: "absolute", ...positions[pos], width: 14, height: 14,
      borderTop: `1px solid ${C.cream}`, borderLeft: `1px solid ${C.cream}`,
      opacity: 0.5, transform: `rotate(${rotate[pos]}deg)`,
    }} />
  );
}

/* ── Hero ── */
const HERO_VIDEO = "https://www.image2url.com/r2/default/videos/1777724136438-04a54608-2177-459d-8508-28da8ae9a31a.mp4";

function Hero() {
  return (
    <section data-screen-label="01 Hero" style={{ position: "relative", overflow: "hidden", background: "#0a0a0a" }}>
      <div style={{ position: "relative", width: "100%", minHeight: "calc(100vh - 60px)", overflow: "hidden" }}>
        <video
          src={HERO_VIDEO} autoPlay muted loop playsInline preload="metadata"
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }}
        />
        <Corner pos="tl" /><Corner pos="tr" /><Corner pos="bl" /><Corner pos="br" />
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0, height: "30%",
          background: "linear-gradient(to top, rgba(0,0,0,0.4), transparent)",
          pointerEvents: "none",
        }} />
        <div style={{
          position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)",
          fontFamily: "'Raleway',sans-serif", fontSize: 9, letterSpacing: 3,
          color: "rgba(232,228,216,0.7)", textAlign: "center",
        }}>↓</div>
      </div>
    </section>
  );
}

/* ── Products ── */
const PRODUCTS = [
  { id: "blazer", name: "Oversized Blazer", img: "assets/product-blazer.png" },
  { id: "dress",  name: "Bias Mini",        img: "assets/product-dress.png"  },
];

function SectionHead({ kicker, title }) {
  return (
    <div style={{ borderBottom: `1px solid ${C.marbleLine}`, paddingBottom: 28, marginBottom: 64 }}>
      {kicker && (
        <div style={{
          fontFamily: "'Raleway',sans-serif", fontSize: 10.5, letterSpacing: 3,
          color: C.marbleInkFaint, marginBottom: 20, textTransform: "uppercase", fontWeight: 600,
        }}>{kicker}</div>
      )}
      <h2 style={{
        fontFamily: "'Prata',serif", fontSize: "clamp(44px,6vw,80px)",
        lineHeight: 0.95, margin: 0, fontWeight: 400, color: C.marbleInk, letterSpacing: "-0.015em",
      }}>{title}</h2>
    </div>
  );
}

function ProductCard({ p, onAdd }) {
  const [hover, setHover] = useState(false);
  const [btnHover, setBtnHover] = useState(false);

  return (
    <div style={{ display: "flex", flexDirection: "column" }}>
      <a
        href={`#${p.id}`}
        onMouseEnter={() => setHover(true)}
        onMouseLeave={() => setHover(false)}
        style={{ textDecoration: "none", color: "inherit", display: "block" }}
      >
        <div style={{
          position: "relative", aspectRatio: "2/3", background: "#fafaf7",
          border: `1px solid ${C.marbleLine}`, overflow: "hidden",
          boxShadow: hover ? "0 30px 60px -30px rgba(13,40,24,0.4)" : "0 10px 30px -20px rgba(13,40,24,0.15)",
          transition: "box-shadow 0.4s, transform 0.4s",
          transform: hover ? "translateY(-4px)" : "translateY(0)",
        }}>
          <img
            src={p.img} alt={p.name}
            style={{
              position: "absolute", inset: 0, width: "100%", height: "100%",
              objectFit: "cover", objectPosition: "top center",
              transform: hover ? "scale(1.04)" : "scale(1)",
              transition: "transform 1.2s cubic-bezier(.2,.8,.2,1)", display: "block",
            }}
          />
          <div style={{ position: "absolute", top: 10, left: 10, width: 12, height: 12, borderTop: "1px solid rgba(232,228,216,0.6)", borderLeft: "1px solid rgba(232,228,216,0.6)" }} />
          <div style={{ position: "absolute", top: 10, right: 10, width: 12, height: 12, borderTop: "1px solid rgba(232,228,216,0.6)", borderRight: "1px solid rgba(232,228,216,0.6)" }} />
        </div>
      </a>

      <div style={{ paddingTop: 20, display: "flex", flexDirection: "column", gap: 6 }}>
        <div style={{
          fontFamily: "'Prata',serif", fontSize: 22, color: C.marbleInk,
          lineHeight: 1.15, letterSpacing: "-0.01em",
        }}>{p.name}</div>
        <button
          onClick={() => onAdd(p)}
          onMouseEnter={() => setBtnHover(true)}
          onMouseLeave={() => setBtnHover(false)}
          style={{
            marginTop: 14, padding: "13px 0",
            background: btnHover ? C.forestDark : "transparent",
            color: btnHover ? C.cream : C.marbleInk,
            border: `1px solid ${C.marbleLine}`,
            fontFamily: "'Raleway',sans-serif", fontSize: 9,
            letterSpacing: 3, textTransform: "uppercase", fontWeight: 600,
            cursor: "pointer", transition: "background 0.25s, color 0.25s",
          }}
        >Add to bag →</button>
      </div>
    </div>
  );
}

function ProductsSection({ onAdd }) {
  return (
    <section
      id="collection"
      data-screen-label="02 Collection"
      className="products-section"
      style={{ backgroundColor: C.marbleBase, padding: "100px 40px 120px", position: "relative" }}
    >
      <SectionHead title="The Collection" />
      <div className="products-grid" style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 40 }}>
        {PRODUCTS.map(p => <ProductCard key={p.id} p={p} onAdd={onAdd} />)}
      </div>
    </section>
  );
}

/* ── Philosophy ── */
function Philosophy() {
  return (
    <section
      data-screen-label="03 Philosophy"
      className="philosophy-section"
      style={{ background: C.forestDark, padding: "100px 40px", color: C.cream, textAlign: "center" }}
    >
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <p style={{
          fontFamily: "'Prata',serif", fontSize: "clamp(28px,4vw,42px)",
          lineHeight: 1.25, color: C.cream, letterSpacing: "-0.01em",
          margin: 0, fontWeight: 400,
        }}>
          Clothes that don't shout.
        </p>
        <div style={{
          fontFamily: "'Raleway',sans-serif", fontSize: 10, letterSpacing: 3,
          color: C.creamFaint, marginTop: 24, textTransform: "uppercase",
        }}>AHMEDABAD</div>
      </div>
    </section>
  );
}

/* ── Footer ── */
function FooterCol({ title, items }) {
  return (
    <div>
      <div style={{
        fontFamily: "'Raleway',sans-serif", fontSize: 10, letterSpacing: 2.5,
        color: C.creamFaint, textTransform: "uppercase", fontWeight: 600, marginBottom: 20,
      }}>— {title}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {items.map(item => (
          <a key={item} href="#" style={{ fontFamily: "'Raleway',sans-serif", fontSize: 14, color: C.cream, textDecoration: "none" }}>{item}</a>
        ))}
      </div>
    </div>
  );
}

function FooterSection() {
  const [phone, setPhone] = useState("");
  const [ok, setOk] = useState(false);

  return (
    <footer
      id="archive"
      data-screen-label="04 Footer"
      className="footer-section"
      style={{ background: C.forestDark, color: C.cream, padding: "120px 40px 40px" }}
    >
      <div className="footer-grid" style={{
        display: "grid", gridTemplateColumns: "1.3fr 1fr 1fr", gap: 60,
        paddingBottom: 80, borderBottom: "1px solid rgba(232,228,216,0.12)",
      }}>
        <div>
          <div style={{ fontFamily: "'Prata',serif", fontSize: 36, lineHeight: 1.1, color: C.cream, letterSpacing: "-0.01em" }}>
            Stay in touch.
          </div>
          <form
            onSubmit={e => { e.preventDefault(); if (phone) setOk(true); }}
            style={{ marginTop: 28, display: "flex", alignItems: "stretch", maxWidth: 420 }}
          >
            <input
              value={phone}
              onChange={e => setPhone(e.target.value)}
              placeholder={ok ? "thank you —" : "+91 00000 00000"}
              style={{
                flex: 1, background: "transparent",
                border: "1px solid rgba(232,228,216,0.2)", borderRight: "none",
                padding: "14px 16px", color: C.cream,
                fontFamily: "'Raleway',sans-serif", fontSize: 14, outline: "none",
              }}
            />
            <button type="submit" style={{
              background: C.cream, color: C.forestDark, border: "none",
              padding: "0 24px", fontFamily: "'Raleway',sans-serif",
              fontSize: 10, letterSpacing: 2.5, textTransform: "uppercase",
              cursor: "pointer", fontWeight: 600,
            }}>{ok ? "✓ Added" : "WhatsApp →"}</button>
          </form>
        </div>
        <FooterCol title="Studio" items={["About", "Provenance", "Mending service", "Stockists", "Press"]} />
        <FooterCol title="Help" items={["Contact", "Shipping", "Returns", "Size guide", "FAQ"]} />
      </div>

      <div className="footer-bottom" style={{
        paddingTop: 32, display: "flex", justifyContent: "space-between",
        alignItems: "flex-end", flexWrap: "wrap", gap: 30,
      }}>
        <img
          src="assets/wilourin-logo.png"
          alt="WILOURIN"
          className="footer-wordmark"
          style={{ height: 120, filter: "brightness(0) invert(1)" }}
        />
        <div style={{
          fontFamily: "'Raleway',sans-serif", fontSize: 14, letterSpacing: 2,
          color: C.creamFaint, textTransform: "uppercase", fontWeight: 600,
          textAlign: "right", lineHeight: 1.8,
        }}>
          © 2026 WILOURIN STUDIO PVT LTD<br />
          <span style={{ fontSize: 18, letterSpacing: 3 }}>AHMEDABAD</span><br />
          <div style={{ display: "flex", gap: 16, justifyContent: "flex-end", marginTop: 10 }}>
            <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram" style={{ color: C.creamFaint }}>
              <IconInstagram />
            </a>
            <a href="https://wa.me/918140081461" target="_blank" rel="noopener" aria-label="WhatsApp" style={{ color: C.creamFaint }}>
              <IconWhatsApp />
            </a>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ── Cart Drawer ── */
function CartDrawer({ open, onClose, items, onRemove }) {
  return (
    <>
      <div
        onClick={onClose}
        style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)",
          opacity: open ? 1 : 0, pointerEvents: open ? "auto" : "none",
          transition: "opacity 0.3s", zIndex: 200,
        }}
      />
      <aside style={{
        position: "fixed", top: 0, right: 0, bottom: 0, width: 440,
        maxWidth: "92vw", backgroundColor: C.marbleBase,
        borderLeft: `1px solid ${C.marbleLine}`,
        transform: open ? "translateX(0)" : "translateX(100%)",
        transition: "transform 0.45s cubic-bezier(.2,.8,.2,1)",
        zIndex: 201, color: C.marbleInk, display: "flex", flexDirection: "column",
      }}>
        <div style={{
          padding: "28px 32px", borderBottom: `1px solid ${C.marbleLine}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <div>
            <div style={{ fontFamily: "'Raleway',sans-serif", fontSize: 10, letterSpacing: 2.5, color: C.marbleInkFaint }}>
              YOUR BAG · {String(items.length).padStart(2, "0")}
            </div>
            <div style={{ fontFamily: "'Prata',serif", fontSize: 26, marginTop: 4 }}>Holding</div>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: C.marbleInk, fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "12px 32px" }}>
          {items.length === 0 && (
            <div style={{ padding: "60px 0", textAlign: "center", fontFamily: "'Prata',serif", fontStyle: "italic", fontSize: 22, color: C.marbleInkFaint }}>
              Nothing here, <span style={{ color: C.forestEmerald }}>yet.</span>
            </div>
          )}
          {items.map((it, i) => (
            <div key={i} style={{
              display: "grid", gridTemplateColumns: "80px 1fr",
              gap: 18, padding: "20px 0", borderBottom: `1px solid ${C.marbleLine}`, alignItems: "start",
            }}>
              <div style={{ height: 100, background: "#fafaf7", border: `1px solid ${C.marbleLine}`, overflow: "hidden" }}>
                <img src={it.img} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top", display: "block" }} />
              </div>
              <div>
                <div style={{ fontFamily: "'Prata',serif", fontSize: 18, marginTop: 4 }}>{it.name}</div>
                <button
                  onClick={() => onRemove(i)}
                  style={{
                    background: "transparent", border: "none", color: C.marbleInkFaint,
                    fontFamily: "'Raleway',sans-serif", fontSize: 9, letterSpacing: 1.5,
                    marginTop: 10, padding: 0, cursor: "pointer",
                    textTransform: "uppercase", fontWeight: 600, textDecoration: "underline",
                  }}
                >Remove</button>
              </div>
            </div>
          ))}
        </div>

        <div style={{ padding: "24px 32px", borderTop: `1px solid ${C.marbleLine}` }}>
          <button style={{
            width: "100%", padding: "16px 0", background: C.forestDark, color: C.cream,
            border: "none", fontFamily: "'Raleway',sans-serif", fontSize: 11,
            letterSpacing: 3, textTransform: "uppercase", cursor: "pointer", fontWeight: 600,
          }}>Proceed to checkout →</button>
        </div>
      </aside>
    </>
  );
}

/* ── App ── */
function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const add = p => { setCart([...cart, p]); setCartOpen(true); };
  const remove = i => setCart(cart.filter((_, j) => j !== i));

  return (
    <>
      <Nav onCart={() => setCartOpen(true)} cartCount={cart.length} />
      <Hero />
      <ProductsSection onAdd={add} />
      <Philosophy />
      <FooterSection />
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} onRemove={remove} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
